<figure class="media">
    <a href="{{ page.url }}"{% if active %} class="act"{% endif %}><img src="{{ page.thmb }}" alt="{{ page.game }} {{ page.category }}" title="{{ page.title }}"></a>
    <figcaption>
        <span class="legend">{{ page.category }}</span><span class="date">{{ page.date | date: '%Y-%m-%d' }}</span>
    </figcaption>
</figure>

<figure class="meddex">
	<figcaption><a href="{{ page.url }}"><span class="who">{{ page.title }}</span></a></figcaption>
	<a href="{{ page.url }}"><img src="{{ page.thmb }}" alt="{{ page.game }} {{ page.category }}" title="{{ page.game }} {{ page.category }}"></a>
	<div class="date">{{ page.date | date: '%Y-%m-%d %H:%M' }}</div>
</figure>

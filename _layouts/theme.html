<header id="top">
	<h1>Turvy Topsy Studio <sup>BETA</sup></h1>
</header>
<div id="hgbg">{% include highlight.html %}</div>
<div id="container">
    <div id="menu">
        <nav class="exp">
            <h4>Menu <span class="arw">&#9660;</span></h4>
            <ul>{% capture mnact %}{{ page.categories | first | downcase }}{% endcapture %}
                <li><a href="/"><span class="mn{% if page.menu == 'news' or mnact == 'news' %} act{% endif %}">News</span></a></li>
                <li><a href="/games"><span class="mn{% if page.menu == 'games' or mnact == 'games' %} act{% endif %}">Games</span></a></li>
                <li><a href="/media"><span class="mn{% if page.menu == 'media' or  mnact == 'media' %} act{% endif %}">Media</span></a></li>
            </ul>
        </nav>
        <div id="social" class="exp">
            <h4>Social <span class="arw">&#9660;</span></h4>
            <ul>
                <li><a href="http://twitter.com/TurvyTopsyStdio"><span class="mn">Twitter</span></a></li>
            </ul>
        </div>
    </div><div id="main" role="main">
	{{ content }}
    </div>
